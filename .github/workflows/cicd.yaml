name: Student API CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Image Tag
        id: tag
        run: |
          echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build -t bhanurider/student-api:${IMAGE_TAG} .

      - name: Push Docker Image
        run: |
          docker push bhanurider/student-api:${IMAGE_TAG}

      - name: Update Helm values file
        run: |
          sed -i '' "s/tag:.*/tag: ${IMAGE_TAG}/" helm/student-api/values-dev.yaml

      - name: Commit Updated values.yaml
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          git add helm/student-api/values-dev.yaml
          git commit -m "Update image tag to ${IMAGE_TAG}" || echo "No changes"

      - name: Push Updated values.yaml
        run: |
          git push