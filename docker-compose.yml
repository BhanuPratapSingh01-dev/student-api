services:

  mongo:
    image: mongo:latest
    container_name: mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

    restart: always

  api1:
    build: .
    container_name: api1

    env_file:
      - .env

    environment:
      - PORT=8000
      - CONTAINER_NAME=api1
      - MONGO_URI=mongodb://mongo:27017/studentdb

    depends_on:
      - mongo

    restart: always

  api2:
    build: .
    container_name: api2

    env_file:
      - .env

    environment:
      - PORT=8000
      - CONTAINER_NAME=api2
      - MONGO_URI=mongodb://mongo:27017/studentdb

    depends_on:
      - mongo

    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx-lb

    ports:
      - "8080:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - api1
      - api2

    restart: always

volumes:
  mongo-data: