apiVersion: v1
kind: Secret
metadata:
  name: vault-token
  namespace: student-api

type: Opaque
stringData:
  token: root

---
apiVersion: external-secrets.io/v1
kind: SecretStore

metadata:
  name: vault-backend
  namespace: student-api

spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"

      auth:
        tokenSecretRef:
          name: vault-token
          key: token

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: mongodb-secret
  namespace: student-api

spec:
  refreshInterval: 1h

  secretStoreRef:
    name: vault-backend
    kind: SecretStore

  target:
    name: mongodb-secret

  data:
    - secretKey: username
      remoteRef:
        key: student-api
        property: username

    - secretKey: password
      remoteRef:
        key: student-api
        property: password
