apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-config
  namespace: student-api
data:
  MONGO_DB: studentdb

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: student-api
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
    - port: 27017

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: student-api
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb

  template:
    metadata:
      labels:
        app: mongodb

    spec:
      nodeSelector:
        type: database

      containers:
        - name: mongodb
          image: mongo:7

          ports:
            - containerPort: 27017

          env:
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: mongodb-config
                  key: MONGO_DB

            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: username

            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: password

          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db

  volumeClaimTemplates:
    - metadata:
        name: mongodb-data

      spec:
        accessModes: ["ReadWriteOnce"]

        resources:
          requests:
            storage: 1Gi